<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghostwriter — AI Dating Profile Studio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --pink:    #e8889a;
  --peach:   #f5c6a0;
  --purple:  #c47ab8;
  --bg:      #0d0d0f;
  --surface: #16161a;
  --surface2:#1c1c22;
  --border:  #2a2a30;
  --text:    #f0ede8;
  --muted:   #888;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  line-height: 1.6;
}

.app { max-width: 720px; margin: 0 auto; padding: 2rem 1.2rem 6rem; }

.header { text-align: center; margin-bottom: 3rem; }
.logo { 
  font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 700; 
  background: linear-gradient(135deg, var(--peach), var(--pink), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.question-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 1.8rem;
  margin-bottom: 1.5rem;
}

.question-text { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 1rem; color: var(--peach); }

textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 1rem; color: var(--text); font-family: inherit;
  font-size: 1rem; min-height: 100px; resize: none;
}

.btn-primary {
  width: 100%; background: linear-gradient(135deg, var(--pink), var(--purple));
  color: white; border: none; padding: 1.2rem; border-radius: 14px;
  font-size: 1.1rem; font-weight: 600; cursor: pointer; margin-top: 1rem;
}

.btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }

#resultArea {
  display: none; margin-top: 3rem; padding: 2rem;
  background: #111118; border: 1px solid var(--purple); border-radius: 24px;
}
#resultArea.visible { display: block; }

#bioText { font-size: 1.1rem; white-space: pre-wrap; margin-bottom: 2rem; }

.loader {
  display: none; position: fixed; inset: 0; background: rgba(13,13,15,0.95);
  z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
}
.loader.visible { display: flex; }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="logo">Ghostwriter</div>
    <p style="color:var(--muted)">Server-Side Secure Version</p>
  </header>

  <div id="questions">
    <div class="question-card">
      <h3 class="question-text">1. Describe your vibe in three words.</h3>
      <textarea id="a-1" placeholder="e.g. Stoic, ambitious, coffee-obsessed" oninput="checkProgress()"></textarea>
    </div>
    <div class="question-card">
      <h3 class="question-text">2. What are your niche geek-out topics?</h3>
      <textarea id="a-2" placeholder="Watches, space, history..." oninput="checkProgress()"></textarea>
    </div>
    <div class="question-card">
      <h3 class="question-text">3. Describe your sensory 'happy place'.</h3>
      <textarea id="a-3" placeholder="Rain on the roof, smell of old books..." oninput="checkProgress()"></textarea>
    </div>
    <div class="question-card">
      <h3 class="question-text">4. How do you spend a perfect Sunday?</h3>
      <textarea id="a-4" oninput="checkProgress()"></textarea>
    </div>
    <div class="question-card">
      <h3 class="question-text">5. What's a story your friends roast you for?</h3>
      <textarea id="a-5" oninput="checkProgress()"></textarea>
    </div>
  </div>

  <button id="genBtn" class="btn-primary" onclick="generate()" disabled>Answer 5 to Generate</button>

  <div id="resultArea">
    <div id="bioText" contenteditable="true"></div>
    <button class="btn-primary" onclick="copyBio()">Copy Bio</button>
  </div>
</div>

<div id="loader" class="loader"><p>Architecting your narrative...</p></div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxSS7fX6bdPUUUFNBipt1AIddqnqPjqmIp7lYjDRTD7UBMimSuMCCmd9W_vWnVlulJH/exec';

const QUESTIONS = ["Vibe", "Geek-Out", "Happy Place", "Sunday", "Roast"];

function checkProgress() {
  let count = 0;
  for(let i=1; i<=5; i++) {
    if(document.getElementById('a-'+i).value.trim().length > 3) count++;
  }
  document.getElementById('genBtn').disabled = count < 5;
  document.getElementById('genBtn').textContent = count < 5 ? `Answer ${5-count} more` : "Generate Bio ✦";
}

async function generate() {
  const answers = [];
  for(let i=1; i<=5; i++) {
    answers.push({ 
      question: QUESTIONS[i-1], 
      answer: document.getElementById('a-'+i).value.trim() 
    });
  }

  document.getElementById('loader').classList.add('visible');

  try {
    const response = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ answers })
    });

    const data = await response.json();

    if (data.status === "success") {
      document.getElementById('bioText').textContent = data.bio;
      document.getElementById('resultArea').classList.add('visible');
      document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
    } else {
      throw new Error(data.message);
    }

  } catch (err) {
    alert("System Error: " + err.message);
  } finally {
    document.getElementById('loader').classList.remove('visible');
  }
}

function copyBio() {
  const text = document.getElementById('bioText').textContent;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}
</script>

</body>
</html>
